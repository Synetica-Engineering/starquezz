<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarqueZZ — Hi-Fi Visual Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@400;600;700;800&family=Nunito+Sans:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&family=Mulish:wght@400;600;700;800&family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&family=Lilita+One&family=Gochi+Hand&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="directions.css">
<link rel="stylesheet" href="directions2.css">
<style>
  html, body { margin: 0; height: 100%; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="dir_storybook.jsx"></script>
<script type="text/babel" src="dir_cosmic.jsx"></script>
<script type="text/babel" src="dir_toybox.jsx"></script>
<script type="text/babel" src="dir_more.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const W = 320, H = 680;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="storybook" title="A · Storybook" subtitle="Hand-painted warmth · Grandstander + Nunito Sans · no mascot, motif only">
          <DCArtboard id="sb-board" label="Routine board — the daily heart" width={W} height={H}><StorybookBoard /></DCArtboard>
          <DCArtboard id="sb-dream" label="Big Dream — constellation forming" width={W} height={H}><StorybookDream /></DCArtboard>
        </DCSection>

        <DCSection id="cosmic" title="B · Cosmic" subtitle="Deep night sky, glowing stars · Fredoka + Mulish · with mascot “Zee” (the ZZ in StarqueZZ)">
          <DCArtboard id="cz-board" label="Routine board — the daily heart" width={W} height={H}><CosmicBoard /></DCArtboard>
          <DCArtboard id="cz-dream" label="Big Dream — constellation forming" width={W} height={H}><CosmicDream /></DCArtboard>
        </DCSection>

        <DCSection id="toybox" title="C · Toybox" subtitle="Chunky Saturday-morning cartoon + tactile claymation · Baloo 2 + Nunito · no mascot">
          <DCArtboard id="tb-board" label="Routine board — the daily heart" width={W} height={H}><ToyboxBoard /></DCArtboard>
          <DCArtboard id="tb-dream" label="Big Dream — constellation forming" width={W} height={H}><ToyboxDream /></DCArtboard>
        </DCSection>

        <DCSection id="papercraft" title="D · Papercraft" subtitle="Cut-paper collage, bold outlines, stacked-paper shadows · Lilita One + Nunito Sans · very high contrast">
          <DCArtboard id="pc-board" label="Routine board — the daily heart" width={W} height={H}><PapercraftBoard /></DCArtboard>
          <DCArtboard id="pc-dream" label="Big Dream — constellation forming" width={W} height={H}><PapercraftDream /></DCArtboard>
        </DCSection>

        <DCSection id="sketchbook" title="E · Sketchbook" subtitle="Kid's-own crayon / notebook world, hand-drawn wobble · Gochi Hand + Nunito">
          <DCArtboard id="sk-board" label="Routine board — the daily heart" width={W} height={H}><SketchbookBoard /></DCArtboard>
          <DCArtboard id="sk-dream" label="Big Dream — constellation forming" width={W} height={H}><SketchbookDream /></DCArtboard>
        </DCSection>

        <DCSection id="aurora" title="F · Aurora" subtitle="Night-sky magic done right — solid panels, white text, accessible contrast · Quicksand + Mulish">
          <DCArtboard id="au-board" label="Routine board — the daily heart" width={W} height={H}><AuroraBoard /></DCArtboard>
          <DCArtboard id="au-dream" label="Big Dream — constellation forming" width={W} height={H}><AuroraDream /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
